services:
  app:
    build:
      context: ..
      dockerfile: .dockerdev/Dockerfile.dev
    working_dir: /app
    environment:
      - TZ=${TZ:-Europe/Moscow}
    ports:
      - '4711:4711'
    volumes:
      - ..:/app
      - bundle:/usr/local/bundle

  growth_app:
    build:
      context: ..
      dockerfile: .dockerdev/Dockerfile.dev
    working_dir: /app
    env_file:
      - ../.env.dev
    volumes:
      - ..:/app
      - bundle:/usr/local/bundle
    environment:
      BUNDLE_GEMFILE: /app/growth/Gemfile
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ITH_GROWTH_CONFIG: ${ITH_GROWTH_CONFIG:-growth/config/config.yml}

  video_app:
    build:
      context: ..
      dockerfile: .dockerdev/Dockerfile.video.dev
    working_dir: /app
    env_file:
      - ../.env.dev
    volumes:
      - ..:/app
      - bundle:/usr/local/bundle
      - video_node_modules:/app/video/renderer/node_modules
    environment:
      BUNDLE_GEMFILE: /app/video/Gemfile

volumes:
  bundle:
  video_node_modules:
