# yaml-language-server: $schema=https://raw.githubusercontent.com/bibendi/dip/refs/heads/master/schema.json
version: '8.0'

compose:
  files:
    - .dockerdev/compose.yml
  project_name: it-history-journal

interaction:
  shell:
    description: Open a shell in the app container
    service: app
    command: bash
    compose:
      run_options: [no-deps]

  bundle:
    description: Run bundler commands for both Gemfiles
    service: app
    command: sh -c 'bundle "$@" && BUNDLE_GEMFILE=/app/growth/Gemfile bundle "$@"' --
    compose:
      run_options: [no-deps]

  rspec:
    description: Run RSpec tests
    service: app
    command: bundle exec rspec
    compose:
      run_options: [no-deps]

  build:
    description: Build the static site into _site/
    service: app
    command: bundle exec rake build
    compose:
      run_options: [no-deps]

  serve:
    description: Serve the site locally on port 4711
    service: app
    command: bundle exec rake serve
    compose:
      run_options: [no-deps]

  convert_to_webp:
    description: Convert images to WebP (args forwarded to bin/convert_to_webp)
    service: app
    command: bundle exec ruby bin/convert_to_webp
    compose:
      run_options: [no-deps]

  convert_covers:
    description: Convert non-WebP covers to cover.webp, then generate 192×192 thumb.webp from each cover.webp
    service: app
    command: bin/convert_covers
    compose:
      run_options: [no-deps]

  rewrite_excerpts:
    description: "Rewrite article excerpts via OpenAI API. Optional: pass a date like jun-10 to limit to one day"
    service: app
    command: ruby bin/rewrite_excerpts
    compose:
      run_options: [no-deps]

  watch:
    description: Full build then watch articles/ and templates/, serves on http://localhost:4000
    service: app
    command: bundle exec ruby bin/watch
    compose:
      run_options: [no-deps, service-ports]

  growth_shell:
    description: Open a shell in the growth app container
    service: growth_app
    command: bash
    compose:
      run_options: [no-deps]

  grow_bundle:
    description: Run bundler in the growth app container
    service: growth_app
    command: bundle
    compose:
      run_options: [no-deps]

  grow:
    description: Run the growth CLI
    service: growth_app
    command: bundle exec ruby -I growth/lib growth/bin/growth
    compose:
      run_options: [no-deps]

  seo:
    description: Run SEO workflow on articles updated exactly 7 days ago
    service: growth_app
    command: bundle exec ruby -I growth/lib growth/bin/growth seo recent
    compose:
      run_options: [no-deps]

  grow_test:
    description: Run growth tests
    service: growth_app
    command: sh -c "cd /app/growth && bundle exec rake test"
    compose:
      run_options: [no-deps]

  video:
    description: Generate video from article folder (pass scenario as first arg for narration+scenes only)
    service: video_app
    command: bundle exec ruby -I video/lib video/bin/video
    compose:
      run_options: [no-deps]

  audio:
    description: Generate audio narration from article folder
    service: video_app
    command: bundle exec ruby -I video/lib video/bin/audio
    compose:
      run_options: [no-deps]

  video_bundle:
    description: Run bundler commands for the video Gemfile
    service: video_app
    command: bundle
    compose:
      run_options: [no-deps]

  video_shell:
    description: Open a shell in the video app container
    service: video_app
    command: bash
    compose:
      run_options: [no-deps]

provision:
  - dip compose build
  - dip bundle install
  - dip video_bundle install
