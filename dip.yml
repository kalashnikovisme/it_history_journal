# yaml-language-server: $schema=https://raw.githubusercontent.com/bibendi/dip/refs/heads/master/schema.json
version: '8.0'

compose:
  files:
    - .dockerdev/compose.yml
  project_name: it-history-journal

interaction:
  shell:
    description: Open a shell in the app container
    service: app
    command: bash
    compose:
      run_options: [no-deps]

  bundle:
    description: Run bundler commands
    service: app
    command: bundle
    compose:
      run_options: [no-deps]

  rspec:
    description: Run RSpec tests
    service: app
    command: bundle exec rspec
    compose:
      run_options: [no-deps]

  build:
    description: Build the static site into _site/
    service: app
    command: bundle exec rake build
    compose:
      run_options: [no-deps]

  serve:
    description: Serve the site locally on port 4000
    service: app
    command: bundle exec rake serve
    compose:
      run_options: [no-deps]

  convert_to_webp:
    description: Convert images to WebP (args forwarded to bin/convert_to_webp)
    service: app
    command: bundle exec ruby bin/convert_to_webp
    compose:
      run_options: [no-deps]

  convert_covers:
    description: Convert non-WebP covers to cover.webp, then generate 192×192 thumb.webp from each cover.webp
    service: app
    command: bin/convert_covers
    compose:
      run_options: [no-deps]

  watch:
    description: Full build then watch articles/ and templates/, serves on http://localhost:4000
    service: app
    command: bundle exec ruby bin/watch
    compose:
      run_options: [no-deps, service-ports]

provision:
  - dip compose build
  - dip bundle install
